<!DOCTYPE html>
<html lang="en">

<head>
    <title>Weather-app</title>
</head>

<body>
    <div class="container">
        <div class="heading">
            <div class="city">
                Ludhiana
            </div>
        </div>
        <div class="weather">
            <img src="clear.png" alt="ERROR">
            <div class="temp">
                10c
            </div>
            <div class="condition">
                Sunny
            </div>
            <div class="date">
                today
            </div>
        </div>
        <div class="details">
            <div class="sun">
                <div class="sunrise">
                    <img src="" alt="">
                    <div class="detail">
                        <div class="text">
                            Sunrise
                        </div>
                        <div class="time">
                            time
                        </div>
                    </div>
                </div>
                <div class="sunset">
                    <img src="" alt="">
                    <div class="detail">
                        <div class="text">
                            Sunset
                        </div>
                        <div class="time">
                            time
                        </div>
                    </div>
                </div>
            </div>
            <div class="atmosphere">
                <div class="pressure">
                    <div class="detail">
                        <div class="text">
                            Pressure
                        </div>
                        <div class="value">
                            1000
                        </div>
                    </div>
                </div>
                <div class="humidity">
                    <div class="text">
                        Humidity
                    </div>
                    <div class="value">
                        94
                    </div>
                </div>
            </div>
            <div class="air">
                <div class="speed">
                    <div class="text">
                        Speed
                    </div>
                    <div class="value">
                        5
                    </div>
                </div>
                <div class="degree">
                    <div class="text">
                        Degree
                    </div>
                    <div class="value">
                        300
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
